<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 · 云图</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 220px;
      --header-h: 52px;
      --bg0: #07111f;
      --bg1: #0b1730;
      --bg2: #0e1e3a;
      --line: rgba(170,196,255,0.10);
      --line-hi: rgba(134,231,255,0.30);
      --text: #eef4ff;
      --muted: rgba(219,233,255,0.55);
      --cyan: #86e7ff;
      --green: #5ef585;
      --yellow: #f5c842;
      --red: rgba(245,120,100,0.9);
    }

    body {
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      background: var(--bg0);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
    }

    /* ─── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--bg1);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 200;
    }

    .sidebar-logo {
      padding: 18px 20px 16px;
      font-size: 16px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0;
    }

    .nav-section {
      padding: 16px 12px 4px;
    }
    .nav-section-label {
      font-size: 10px;
      color: rgba(219,233,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0 8px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13.5px;
      transition: background 0.15s, color 0.15s;
      user-select: none;
      margin-bottom: 2px;
      text-decoration: none;
    }
    .nav-item:hover { background: rgba(134,231,255,0.06); color: var(--text); }
    .nav-item.active { background: rgba(134,231,255,0.10); color: var(--cyan); font-weight: 600; }
    .nav-item-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      font-size: 10px;
      background: rgba(245,200,66,0.15);
      color: var(--yellow);
      border-radius: 8px;
      padding: 1px 7px;
      font-weight: 600;
    }
    .nav-badge.green { background: rgba(94,245,133,0.12); color: var(--green); }
    .nav-badge.cyan  { background: rgba(134,231,255,0.10); color: var(--cyan); }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--line);
    }

    /* ─── Main area ───────────────────────────────────── */
    .main-wrap {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Top header ──────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(7,17,31,0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 10px;
    }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .topbar-crumb { font-size: 12px; color: rgba(219,233,255,0.35); }

    /* ─── Page content ────────────────────────────────── */
    .page { display: none; flex: 1; }
    .page.active { display: block; }

    /* ─── Overview / dashboard page ──────────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 12px;
      padding: 28px 28px 0;
    }
    .ov-card {
      background: rgba(11,23,48,0.6);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .ov-num { font-size: 32px; font-weight: 700; line-height: 1.1; }
    .ov-num.cyan   { color: var(--cyan); }
    .ov-num.yellow { color: var(--yellow); }
    .ov-num.green  { color: var(--green); }
    .ov-num.muted  { color: rgba(219,233,255,0.5); }
    .ov-label { font-size: 12px; color: var(--muted); margin-top: 5px; }

    .overview-hints {
      padding: 20px 28px 40px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hint-item {
      font-size: 13px;
      color: rgba(219,233,255,0.45);
      padding: 10px 14px;
      background: rgba(11,23,48,0.4);
      border-radius: 7px;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hint-item a {
      color: var(--cyan);
      cursor: pointer;
      text-decoration: none;
    }
    .hint-item a:hover { text-decoration: underline; }

    /* ─── Review page (内容审核) ──────────────────────── */
    .review-topbar {
      padding: 22px 28px 0;
    }
    .stats-bar {
      display: flex;
      gap: 0;
    }
    .stat-item {
      background: rgba(11,23,48,0.5);
      border: 1px solid var(--line);
      padding: 13px 24px;
      min-width: 110px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      flex: 1;
      max-width: 170px;
    }
    .stat-item:first-child { border-radius: 8px 0 0 8px; }
    .stat-item:last-child  { border-radius: 0 8px 8px 0; }
    .stat-item + .stat-item { border-left: none; }
    .stat-item:hover  { background: rgba(20,36,70,0.8); }
    .stat-item.active { background: rgba(20,36,70,0.95); border-color: rgba(134,231,255,0.3); }
    .stat-num-r { font-size: 26px; font-weight: 700; line-height: 1.2; }
    .stat-num-r.all      { color: rgba(219,233,255,0.9); }
    .stat-num-r.draft    { color: var(--yellow); }
    .stat-num-r.approved { color: var(--green); }
    .stat-num-r.live     { color: var(--cyan); }
    .stat-label { font-size: 12px; color: rgba(219,233,255,0.4); margin-top: 3px; }

    .filter-bar {
      padding: 14px 28px 10px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filter-label { font-size: 12px; color: rgba(219,233,255,0.35); flex-shrink:0; }
    .planet-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .planet-chip {
      font-size: 12px; padding: 3px 12px; border-radius: 20px;
      border: 1px solid rgba(170,196,255,0.14);
      color: rgba(219,233,255,0.55);
      background: rgba(11,23,48,0.4);
      cursor: pointer; transition: all 0.18s; user-select: none;
    }
    .planet-chip:hover { border-color: rgba(134,231,255,0.3); color: var(--text); }
    .planet-chip.active { background: rgba(20,36,70,0.9); border-color: rgba(134,231,255,0.4); color: var(--cyan); }

    .approval-banner {
      margin: 0 28px 12px;
      background: rgba(94,245,133,0.07);
      border: 1px solid rgba(94,245,133,0.2);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px; color: rgba(94,245,133,0.85);
      display: none;
    }
    .approval-banner.visible { display: block; }

    .card-list { padding: 0 28px 60px; display: flex; flex-direction: column; gap: 8px; }

    .review-card {
      background: rgba(11,23,48,0.65);
      border: 1px solid var(--line);
      border-radius: 10px; overflow: hidden; transition: border-color 0.2s;
    }
    .review-card:hover { border-color: rgba(170,196,255,0.2); }
    .review-card.is-approved { border-left: 3px solid rgba(94,245,133,0.4); }
    .review-card.is-live     { border-left: 3px solid rgba(134,231,255,0.22); }

    .card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; cursor: pointer; user-select: none;
    }
    .card-header:hover .card-title-text { color: #a8d8ff; }

    .planet-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: rgba(134,231,255,0.09); color: rgba(134,231,255,0.85);
      white-space: nowrap; flex-shrink: 0;
    }
    .status-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .status-badge.draft    { background: rgba(245,200,66,0.12); color: var(--yellow); }
    .status-badge.approved { background: rgba(94,245,133,0.12); color: var(--green); }
    .status-badge.live     { background: rgba(134,231,255,0.09); color: rgba(134,231,255,0.8); }

    .card-id { font-size: 11px; color: rgba(219,233,255,0.25); font-family: 'Menlo','Courier New',monospace; flex-shrink:0; }
    .card-title-text { font-size: 13.5px; font-weight: 600; color: #d8e8ff; flex:1; min-width:0; transition: color 0.2s; }
    .card-chevron { color: rgba(219,233,255,0.3); font-size: 11px; flex-shrink:0; transition: transform 0.25s; }
    .review-card.expanded .card-chevron { transform: rotate(180deg); }

    .card-body {
      display: none; padding: 0 20px 20px;
      border-top: 1px solid rgba(170,196,255,0.07);
    }
    .review-card.expanded .card-body { display: block; }

    .card-hook {
      font-size: 13.5px; color: rgba(219,233,255,0.85); font-style: italic;
      border-left: 3px solid rgba(134,231,255,0.4);
      padding: 9px 14px; margin: 14px 0;
      background: rgba(134,231,255,0.04); border-radius: 0 6px 6px 0; line-height: 1.75;
    }
    .section-label {
      font-size: 11px; color: rgba(219,233,255,0.35);
      text-transform: uppercase; letter-spacing: 0.1em; margin: 12px 0 7px;
    }
    .card-text { font-size: 13.5px; color: rgba(219,233,255,0.75); line-height: 1.9; }
    .card-text p + p { margin-top: 11px; }
    .fragments { display: flex; flex-direction: column; gap: 6px; }
    .fragment-item {
      font-size: 13px; color: rgba(219,233,255,0.6);
      background: rgba(134,231,255,0.03);
      border-left: 2px solid rgba(134,231,255,0.18);
      border-radius: 0 6px 6px 0; padding: 7px 12px; line-height: 1.65;
    }
    .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 13px; }
    .meta-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: rgba(20,36,70,0.7); color: rgba(219,233,255,0.45);
      border: 1px solid rgba(170,196,255,0.09);
    }
    .source-note {
      font-size: 12px; color: rgba(245,200,66,0.6); margin-top: 11px;
      padding: 8px 12px; background: rgba(245,200,66,0.04);
      border-left: 2px solid rgba(245,200,66,0.3); border-radius: 0 6px 6px 0; line-height: 1.6;
    }
    .source-note::before { content: '⚠ 来源备注：'; font-weight: 600; }
    .card-actions {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px; padding-top: 13px;
      border-top: 1px solid rgba(170,196,255,0.07);
    }

    /* ─── User management page ────────────────────────── */
    .users-wrap { padding: 24px 28px 60px; }

    .users-toolbar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .users-info {
      font-size: 13px; color: var(--muted);
      background: rgba(11,23,48,0.5);
      border: 1px solid var(--line); border-radius: 8px;
      padding: 10px 16px; margin-bottom: 16px; line-height: 1.7;
    }
    .users-info a { color: var(--cyan); cursor: pointer; text-decoration: none; }
    .users-info a:hover { text-decoration: underline; }

    .search-input {
      flex: 1; max-width: 280px;
      background: rgba(11,23,48,0.7);
      border: 1px solid var(--line); border-radius: 7px;
      color: var(--text); font-size: 13px; padding: 7px 12px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: rgba(134,231,255,0.35); }
    .search-input::placeholder { color: rgba(219,233,255,0.25); }

    .users-count { font-size: 13px; color: var(--muted); margin-left: auto; }

    .users-table-wrap { overflow-x: auto; border-radius: 10px; }
    .users-table {
      width: 100%; border-collapse: collapse;
      background: rgba(11,23,48,0.5);
      border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    }
    .users-table th {
      background: rgba(11,20,40,0.8);
      font-size: 11px; font-weight: 600;
      color: rgba(219,233,255,0.45);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 10px 14px; text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .users-table td {
      padding: 11px 14px; border-bottom: 1px solid rgba(170,196,255,0.06);
      font-size: 13px; color: rgba(219,233,255,0.75); vertical-align: top;
    }
    .users-table tr:last-child td { border-bottom: none; }
    .users-table tr:hover td { background: rgba(134,231,255,0.03); }

    .user-email { color: var(--text); font-weight: 500; }
    .user-name  { color: var(--muted); font-size: 12px; }
    .user-id    { font-family: 'Menlo','Courier New',monospace; font-size: 11px; color: rgba(219,233,255,0.25); }
    .user-date  { font-size: 12px; color: rgba(219,233,255,0.35); white-space: nowrap; }

    .app-state-toggle {
      font-size: 11px; color: var(--cyan); cursor: pointer; border: none; background: none;
      font-family: inherit; padding: 0;
    }
    .app-state-toggle:hover { text-decoration: underline; }

    .app-state-json {
      display: none; margin-top: 6px; font-family: 'Menlo','Courier New',monospace;
      font-size: 11px; color: rgba(219,233,255,0.45); white-space: pre-wrap; word-break: break-all;
      background: rgba(7,13,27,0.7); border-radius: 5px; padding: 8px 10px;
      max-height: 150px; overflow-y: auto; border: 1px solid var(--line);
    }
    .app-state-json.visible { display: block; }

    .no-access-box {
      background: rgba(245,200,66,0.06);
      border: 1px solid rgba(245,200,66,0.25);
      border-radius: 10px; padding: 28px 24px;
      max-width: 600px;
    }
    .no-access-box h3 { color: var(--yellow); font-size: 15px; margin-bottom: 10px; }
    .no-access-box p  { color: var(--muted); font-size: 13px; line-height: 1.8; margin-bottom: 8px; }
    .no-access-box code {
      display: block; background: rgba(7,13,27,0.8); padding: 12px 14px;
      border-radius: 6px; font-size: 12px; font-family: 'Menlo','Courier New',monospace;
      color: rgba(219,233,255,0.7); white-space: pre; overflow-x: auto; margin: 10px 0;
      border: 1px solid var(--line);
    }

    /* ─── Shared ──────────────────────────────────────── */
    .btn {
      font-size: 13px; font-family: inherit;
      padding: 7px 18px; border-radius: 6px; border: 1px solid transparent;
      cursor: pointer; transition: all 0.2s; font-weight: 500;
    }
    .btn-approve { background: rgba(94,245,133,0.1); border-color: rgba(94,245,133,0.35); color: var(--green); }
    .btn-approve:hover { background: rgba(94,245,133,0.2); }
    .btn-revoke  { background: rgba(245,100,80,0.07); border-color: rgba(245,100,80,0.28); color: var(--red); }
    .btn-revoke:hover  { background: rgba(245,100,80,0.15); }
    .btn-ghost   { background: rgba(134,231,255,0.06); border-color: rgba(134,231,255,0.2); color: var(--cyan); }
    .btn-ghost:hover   { background: rgba(134,231,255,0.12); }
    .btn-note { background: transparent; border-color: transparent; color: rgba(219,233,255,0.28); cursor: default; font-size: 12px; padding-left: 0; }

    .empty-state {
      text-align: center; padding: 56px 32px;
      color: rgba(219,233,255,0.28); font-size: 14px;
    }
    .empty-state strong { display:block; font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(134,231,255,0.2);
      border-top-color: var(--cyan);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

  <!-- ────────────── Sidebar ────────────── -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span>☁</span>
      <div>
        <div>云图</div>
        <div class="sidebar-logo-sub">后台管理</div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">总览</div>
      <div class="nav-item active" data-page="overview">
        <span class="nav-item-icon">◈</span>概览
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">内容</div>
      <div class="nav-item" data-page="review">
        <span class="nav-item-icon">✦</span>内容审核
        <span class="nav-badge" id="draftBadge" style="display:none"></span>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">用户</div>
      <div class="nav-item" data-page="users">
        <span class="nav-item-icon">◎</span>注册用户
        <span class="nav-badge cyan" id="usersBadge" style="display:none"></span>
      </div>
    </div>

    <div class="sidebar-footer">
      <a class="nav-item" href="./index.html">
        <span class="nav-item-icon">←</span>返回 Demo
      </a>
    </div>
  </nav>

  <!-- ────────────── Main ────────────── -->
  <div class="main-wrap">
    <div class="topbar">
      <span class="topbar-crumb">云图后台</span>
      <span class="topbar-crumb">/</span>
      <span class="topbar-title" id="topbarTitle">概览</span>
    </div>

    <!-- Overview -->
    <div class="page active" id="page-overview">
      <div class="overview-grid" id="overviewGrid"></div>
      <div class="overview-hints" id="overviewHints"></div>
    </div>

    <!-- Review -->
    <div class="page" id="page-review">
      <div class="review-topbar">
        <div class="stats-bar" id="statsBar"></div>
      </div>
      <div class="filter-bar" id="filterBar"></div>
      <div class="approval-banner" id="approvalBanner"></div>
      <div class="card-list" id="cardList"></div>
    </div>

    <!-- Users -->
    <div class="page" id="page-users">
      <div class="users-wrap">
        <div class="users-toolbar">
          <input class="search-input" id="userSearch" type="text" placeholder="搜索邮箱或昵称…" />
          <button class="btn btn-ghost" id="usersRefresh">↺ 刷新</button>
          <span class="users-count" id="usersCount"></span>
        </div>
        <div id="usersContent">
          <div class="loading-row"><span class="spinner"></span>正在连接 Supabase…</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./supabase-config.js"></script>
  <script type="module" src="./scripts/admin.js"></script>
</body>
</html>
